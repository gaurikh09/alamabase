{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Login</h2>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert" style="background: #f8d7da; color: #721c24; margin-bottom: 1rem;">Invalid username or password</div>
        {% endif %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Login</button>
        <a href="{% url 'signup' %}" style="margin-left: 1rem;">Sign Up</a>
    </form>
</div>
{% endblock %}
